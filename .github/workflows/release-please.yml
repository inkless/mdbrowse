name: Release Please

# Watches `main` for Conventional Commits and maintains a single open
# Release PR that bumps `package.json` + writes `CHANGELOG.md`. Merging
# the Release PR creates the `vX.Y.Z` tag, which triggers `release.yml`
# to publish to npm via Trusted Publishing.

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
