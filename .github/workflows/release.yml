name: Release

# Triggered by pushing a tag like `v0.1.0`. The version in package.json must
# match the tag (without the `v` prefix). Authenticates to npm via Trusted
# Publishing (OIDC) — configure on npmjs.com under the package's Settings →
# Trusted Publisher. No NPM_TOKEN secret needed.
on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write # for npm provenance
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Verify tag matches package.json version
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION=${GITHUB_REF_NAME#v}
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::package.json version ($PKG_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi

      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm exec playwright test

      # Publish via the npm CLI (≥11.5.1) so npm's Trusted Publishing
      # OIDC exchange runs. `pnpm publish` only signs Sigstore provenance
      # but does not authenticate to the npm registry. We run npm via
      # `npx` so we get the latest CLI without the global self-install
      # (which is brittle on the GitHub-hosted runner — `npm install -g
      # npm@latest` often leaves a partial state and fails with
      # `Cannot find module 'promise-retry'`).
      #
      # `--ignore-scripts` skips the `prepublishOnly` hook in package.json
      # (which would re-run build/test/lint) since the steps above already
      # cover that. Local `pnpm publish` from a developer's laptop still
      # benefits from the hook as a safety net.
      - name: Publish via npm with trusted publishing
        run: npx -y npm@latest publish --access public --provenance --ignore-scripts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
