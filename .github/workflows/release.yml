name: Release

# Triggered by pushing a tag like `v0.1.0`. The version in package.json must
# match the tag (without the `v` prefix). Authenticates to npm via Trusted
# Publishing (OIDC) — configure on npmjs.com under the package's Settings →
# Trusted Publisher. No NPM_TOKEN secret needed.
#
# Also exposes a manual `workflow_dispatch` trigger as an escape hatch:
# when Release Please cuts a tag with the default `GITHUB_TOKEN`, GitHub
# refuses to fire downstream workflows on that push (loop-prevention).
# Re-publishing or first-time-after-PAT-setup runs go through here:
#   gh workflow run release.yml --ref vX.Y.Z
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to publish (e.g. v0.2.3)'
        required: true
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write # for npm provenance
    steps:
      - uses: actions/checkout@v4
        with:
          # On workflow_dispatch we receive `inputs.tag`; on push the tag
          # ref is already the trigger so default checkout is correct.
          ref: ${{ github.event.inputs.tag || github.ref_name }}
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          # Node 24 LTS bundles npm 11.x, which has Trusted Publishing
          # OIDC support. Node 22 ships with npm 10.x — too old.
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Verify tag matches package.json version
        env:
          INPUT_TAG: ${{ github.event.inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_NAME="${INPUT_TAG:-$REF_NAME}"
          TAG_VERSION=${TAG_NAME#v}
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::package.json version ($PKG_VERSION) does not match tag ($TAG_NAME)"
            exit 1
          fi

      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm exec playwright test

      # Publish via the npm CLI bundled with Node 24 (npm 11.x), which
      # supports Trusted Publishing OIDC. `pnpm publish` only signs
      # Sigstore provenance but doesn't authenticate to the npm registry.
      #
      # `--ignore-scripts` skips the `prepublishOnly` hook in package.json
      # (which would re-run build/test/lint) since the steps above already
      # cover that. Local `pnpm publish` from a developer's laptop still
      # benefits from the hook as a safety net.
      - name: Publish via npm with trusted publishing
        run: npm publish --access public --provenance --ignore-scripts

      # GitHub Release for the tag is created by Release Please when it
      # merges its Release PR. We don't create one here — auto-generated
      # PR-title notes would overwrite the changelog-driven release body.
