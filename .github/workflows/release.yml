name: Release

# One workflow, two jobs. The first runs Release Please on every push to
# `main` — it maintains the open Release PR and, when that PR merges,
# creates the `vX.Y.Z` tag + GitHub Release. The second job is gated on
# Release Please's `release_created` output and publishes to npm using
# the tag in the same workflow run, side-stepping GitHub's well-known
# rule that a tag pushed by `GITHUB_TOKEN` cannot itself trigger another
# workflow. This is the pattern recommended in the release-please-action
# README and is the standard for npm packages on Trusted Publishing.
#
# `workflow_dispatch` is exposed as a manual escape hatch — re-publish a
# tag (e.g. after a registry hiccup) with:
#   gh workflow run release.yml -f tag=v0.2.3
on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to (re)publish, e.g. v0.2.3 — only used by manual dispatch"
        required: true
        type: string

jobs:
  release-please:
    # Only the push path needs Release Please; manual dispatch goes
    # straight to publish for an existing tag.
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    needs: release-please
    # Run when:
    #  - release-please succeeded AND a release was actually created, OR
    #  - this run is a manual workflow_dispatch (release-please skipped).
    if: |
      always() &&
      (
        (needs.release-please.result == 'success' && needs.release-please.outputs.release_created == 'true')
        || github.event_name == 'workflow_dispatch'
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # for npm provenance
    steps:
      - uses: actions/checkout@v4
        with:
          # On push: check out the tag Release Please just created.
          # On workflow_dispatch: check out the tag the operator named.
          ref: ${{ github.event.inputs.tag || needs.release-please.outputs.tag_name }}
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          # Node 24 LTS bundles npm 11.x, which has Trusted Publishing
          # OIDC support. Node 22 ships with npm 10.x — too old.
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm exec playwright test

      # Publish via the npm CLI bundled with Node 24 (npm 11.x), which
      # supports Trusted Publishing OIDC. `pnpm publish` only signs
      # Sigstore provenance but doesn't authenticate to the npm registry.
      #
      # `--ignore-scripts` skips the `prepublishOnly` hook in package.json
      # (which would re-run build/test/lint) since the steps above already
      # cover that. Local `pnpm publish` from a developer's laptop still
      # benefits from the hook as a safety net.
      - name: Publish via npm with trusted publishing
        run: npm publish --access public --provenance --ignore-scripts
